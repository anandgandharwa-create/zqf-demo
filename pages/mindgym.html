<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mind Gym</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#071826;
color:#fff;
text-align:center;
}

/* Header */
header{
position:relative;   /* 👈 ADD THIS */
background:linear-gradient(90deg,#5b2c83,#402060);
padding:16px;
font-size:20px;
font-weight:bold;
}

/* Container */
.container{
padding:20px;
max-width:420px;
margin:auto;
}

/* Stats Box */
.stats{
display:flex;
justify-content:space-between;
background:#0b1f2d;
padding:14px;
border-radius:14px;
margin-bottom:20px;
font-size:14px;
}

/* Cards */
.card{
background:linear-gradient(145deg,#132532,#08131c);
border-radius:20px;
padding:20px;
margin-bottom:16px;
cursor:pointer;
position:relative;
overflow:hidden; 
}

.locked{
opacity:0.4;
}

/* Lock Label */
.lockLabel{
position:absolute;
top:10px;
right:12px;
background:#ff4d4d;
padding:4px 8px;
border-radius:8px;
font-size:12px;
}

/* Premium Button */
.premiumBtn{
background:linear-gradient(45deg,#ffd700,#ffb300);
color:#000;
padding:14px;
border-radius:14px;
margin-top:15px;
cursor:pointer;
font-weight:bold;
}

/* Result */
.result{
margin-top:10px;
color:#7CFF9E;
}

/* Back */
.backArrow{
position:absolute;
left:10px;     /* 👈 corner distance */
top:50%;
transform:translateY(-50%);
font-size:22px;
cursor:pointer;
color:#fff;

background:rgba(255,255,255,0.1);   /* optional premium look */
padding:6px 10px;
border-radius:10px;
}
  .backArrow{
z-index:9999;
cursor:pointer;
}
  .disabledBtn{
opacity:0.5;
cursor:not-allowed;
background:linear-gradient(45deg,#999,#666);
color:#ddd;
box-shadow:none;
}
 .breathingBox{
margin-top:20px;
margin-bottom:30px;   /* 👈 space add */
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
position:relative;
z-index:1;
}

.circle{
width:100px;
height:100px;
border-radius:50%;
background:radial-gradient(circle,#00ffd5,#007a6d);
box-shadow:0 0 25px #00ffd5;
transition:all 4s ease-in-out;

/* 👇 IMPORTANT FIX */
margin-bottom:10px;
}

.circle.grow{
transform:scale(1.5);
}

.breathText{
margin-top:12px;
font-size:16px;
color:#7CFF9E;
}
</style>
</head>

<body>

<header>
<span class="backArrow" onclick="window.location.href='../index.html'">←</span>
🧠 Mind Gym
</header>

<div class="container">

<!-- STATS -->
<div class="stats">
<div>🔥 Streak: <span id="streak">0</span></div>
<div>⭐ XP: <span id="xp">0</span></div>
</div>

<!-- FREE EXERCISE -->
<div class="card" onclick="completeExercise()">
<h3>🎯 Focus Drill</h3>
<p>30 सेकंड सांस पर ध्यान दें</p>
<div id="result" class="result"></div>
</div>
<div class="breathingBox">
  <div class="circle" id="circle"></div>
  <div class="breathText" id="breathText">श्वास लें</div>
</div>
<!-- LOCKED -->
<div class="card locked">
<div class="lockLabel">🔒 Premium</div>
<h3>🔁 Thought Shift</h3>
<p>विचार बदलने की कला</p>
</div>

<div class="card locked">
<div class="lockLabel">🔒 Premium</div>
<h3>👁 Awareness Drill</h3>
<p>साक्षी भाव अभ्यास</p>
</div>

<!-- PREMIUM BUTTON -->
<div class="premiumBtn disabledBtn">
🚧 Premium Coming Soon
</div>
<script>
let breathingInterval;
// Load data
let streak = localStorage.getItem("streak") || 0;
let xp = localStorage.getItem("xp") || 0;
let premium = localStorage.getItem("premium") || false;

document.getElementById("streak").innerText = streak;
document.getElementById("xp").innerText = xp;

// Complete exercise
function completeExercise(){

startBreathing();

// 👇 30 सेकंड बाद सब stop + result
setTimeout(()=>{

stopBreathing(); // 👈 breathing बंद

xp++;
streak++;

localStorage.setItem("xp", xp);
localStorage.setItem("streak", streak);

document.getElementById("xp").innerText = xp;
document.getElementById("streak").innerText = streak;

document.getElementById("result").innerText =
"🔥 Great! आपने आज का अभ्यास पूरा किया";

},30000);
}

// Check premium
function checkPremium(){
if(premium === "true"){
alert("Exercise unlocked!");
}else{
alert("🔒 यह Premium है");
}
}

// Buy premium (demo)
function buyPremium(){
localStorage.setItem("premium", "true");
alert("🎉 Premium Activated!");
location.reload();
}
let breathing = false;

function startBreathing(){

let circle = document.getElementById("circle");
let text = document.getElementById("breathText");

function breathe(){
text.innerText = "श्वास लें";
circle.classList.add("grow");

setTimeout(()=>{
text.innerText = "श्वास छोड़ें";
circle.classList.remove("grow");
},4000);
}

breathe();
breathingInterval = setInterval(breathe,8000);
}

breathe();
setInterval(breathe,8000);
}
  function stopBreathing(){

clearInterval(breathingInterval);

let circle = document.getElementById("circle");
let text = document.getElementById("breathText");

// reset state
circle.classList.remove("grow");
text.innerText = "पूर्ण";
}
</script>

</body>
</html>
